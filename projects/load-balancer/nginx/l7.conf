http {
  upstream backend {
    server app1:8080;
    server app2:8080;
    server app3:8080;
  }

  server {
    listen 8081;

    location / {
      proxy_pass http://backend;
    }

    location /api {
      proxy_pass http://backend;
      add_header X-Route "api-backend";
    }
  }
}
events {}
