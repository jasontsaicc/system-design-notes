services:
  app1:
    image: lb-demo-app
    environment:
      - PORT=8080
      - FAIL_RATE=0
  app2:
    image: lb-demo-app
    environment:
      - PORT=8080
      - FAIL_RATE=0
  app3:
    image: lb-demo-app
    environment:
      - PORT=8080
      - FAIL_RATE=0

  lb-l4:
    image: nginx:alpine
    ports:
      - "8082:8080"
    volumes:
      - ./nginx/l4.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  lb-l7:
    image: nginx:alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/l7.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
